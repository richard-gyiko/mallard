name: ci

on:
  push:
    branches: [main]
  pull_request:

# DUCKDB_DOWNLOAD_LIB is set in .cargo/config.toml to speed up Windows local
# dev (downloads a prebuilt DuckDB DLL instead of compiling from source).
# On Linux CI the download flow doesn't produce a linkable libduckdb.so;
# fall back to libduckdb-sys's `bundled` feature (static compile). Slower
# build but reliable across the whole runner matrix.
env:
  DUCKDB_DOWNLOAD_LIB: "0"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked
      - name: Test
        run: cargo test --release --locked

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings
