name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Strip Windows-only DuckDB-download override
        # `.cargo/config.toml` sets DUCKDB_DOWNLOAD_LIB=1 to speed up local
        # Windows dev. cargo's `[env]` table applies before workflow `env`,
        # so we can't override from the workflow — delete the config file
        # on CI so libduckdb-sys falls back to its `bundled` feature
        # (static compile from source).
        run: rm -f .cargo/config.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-bundled"
      - name: Build
        run: cargo build --release --locked
      - name: Test
        run: cargo test --release --locked

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Strip Windows-only DuckDB-download override
        run: rm -f .cargo/config.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-bundled"
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings
