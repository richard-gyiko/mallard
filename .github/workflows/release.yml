name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: mallard-linux-x86_64.tar.gz
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: mallard-linux-arm64.tar.gz
            cross: true
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: mallard-macos-arm64.tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: mallard-macos-x86_64.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: mallard-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile linker (linux arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        env:
          CARGO_PROFILE_RELEASE_LTO: "true"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
        run: cargo build --release --locked --target ${{ matrix.target }} --bin mallard

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mallard dist/mallard
          chmod +x dist/mallard
          tar -czf ${{ matrix.archive }} -C dist mallard

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/mallard.exe dist/mallard.exe
          Compress-Archive -Path dist/mallard.exe -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes "mallard $TAG — multi-platform binaries. Install via the mallard-review GitHub Action or download directly."
