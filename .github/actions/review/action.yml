name: "mallard review"
description: "Structural-evidence PR review with confidence-tier badges. Runs entirely on the runner — no source leaves CI."
branding:
  icon: "git-pull-request"
  color: "purple"

inputs:
  # Mallard is deterministic-only by design (see ADR-0013). No API key input,
  # ever — the action runs offline on the GitHub-hosted runner.
  languages:
    description: "Comma-separated language allowlist for the index."
    required: false
    default: "rust,python,typescript,tsx"
  rules-path:
    description: "Path to a rules.yml file. Optional — without it, structural-rule findings are skipped."
    required: false
    default: ""
  max-comments:
    description: "Per-review comment budget. Lowest-confidence comments drop first."
    required: false
    default: "10"
  base-sha:
    description: "Base SHA to compare against. Defaults to the PR's base."
    required: false
    default: "${{ github.event.pull_request.base.sha }}"
  head-sha:
    description: "Head SHA. Defaults to the PR's head."
    required: false
    default: "${{ github.event.pull_request.head.sha }}"
  mallard-rev:
    description: "Git revision of mallard to build from. Defaults to the latest stable tag. Override with 'main' to track unreleased changes (no stability guarantee)."
    required: false
    default: "v0.1.2"
  post-comment:
    description: "Post the rendered review as a PR comment. Set to 'false' to dry-run."
    required: false
    default: "true"
  ignore-test-trivia:
    description: "Suppress modified-body-touched comments on test files whose diff overlap covers ≤2 lines. Default true — small literal flips in test fixtures rarely warrant reviewer attention."
    required: false
    default: "true"

outputs:
  review-markdown-path:
    description: "Path to the rendered review markdown on the runner."
    value: ${{ steps.review.outputs.markdown-path }}
  comments-emitted:
    description: "Number of comments in the review (from JSON summary)."
    value: ${{ steps.review.outputs.comments-emitted }}

runs:
  using: "composite"
  steps:
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache mallard build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/mallard
          ~/.cargo/registry
          ~/.cargo/git
        key: mallard-${{ runner.os }}-${{ inputs.mallard-rev }}-v1

    - name: Install mallard CLI
      shell: bash
      env:
        MALLARD_REV: ${{ inputs.mallard-rev }}
      run: |
        if ! command -v mallard >/dev/null 2>&1; then
          cargo install --locked --git https://github.com/richard-gyiko/mallard --rev "$MALLARD_REV"
        fi
        mallard --version || true

    - name: Resolve changed files
      id: files
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        HEAD_SHA: ${{ inputs.head-sha }}
      run: |
        git fetch --no-tags --depth=1 origin "$BASE_SHA" || true
        # Comma-separated list of changed files between base and head.
        CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | paste -sd, -)
        echo "files=$CHANGED" >> "$GITHUB_OUTPUT"

    - name: Resolve index args
      id: idx-args
      shell: bash
      env:
        LANGUAGES: ${{ inputs.languages }}
        RULES: ${{ inputs.rules-path }}
      run: |
        # Build shared --lang / --rules args once; reused by both index steps below.
        LANG_ARGS=""
        IFS=',' read -ra LANGS <<< "$LANGUAGES"
        for L in "${LANGS[@]}"; do LANG_ARGS+=" --lang $L"; done
        # Rules: user-supplied path wins; otherwise load the bundled default
        # rule pack so structural-rule findings surface without per-repo
        # configuration (pilot Finding 5).
        if [ -n "$RULES" ]; then
          RULES_ARG="--rules $RULES"
        else
          RULES_ARG="--rules-bundled"
        fi
        echo "lang-args=$LANG_ARGS" >> "$GITHUB_OUTPUT"
        echo "rules-arg=$RULES_ARG" >> "$GITHUB_OUTPUT"

    - name: Index base SHA
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        LANG_ARGS: ${{ steps.idx-args.outputs.lang-args }}
        RULES_ARG: ${{ steps.idx-args.outputs.rules-arg }}
      run: |
        mkdir -p .mallard
        git worktree add /tmp/mallard-base "$BASE_SHA"
        mallard index --sha "$BASE_SHA" --out .mallard/base.duckdb $LANG_ARGS $RULES_ARG /tmp/mallard-base >/dev/null
        git worktree remove /tmp/mallard-base

    - name: Index head SHA
      shell: bash
      env:
        HEAD_SHA: ${{ inputs.head-sha }}
        LANG_ARGS: ${{ steps.idx-args.outputs.lang-args }}
        RULES_ARG: ${{ steps.idx-args.outputs.rules-arg }}
      run: |
        mallard index --sha "$HEAD_SHA" --out .mallard/head.duckdb $LANG_ARGS $RULES_ARG . >/dev/null

    - name: Compute diff hunks
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        HEAD_SHA: ${{ inputs.head-sha }}
      run: |
        # `mallard diff-hunks` wraps `git diff --unified=0` and emits the
        # JSON shape `pr-review --diff-hunks` consumes. Enables Finding-7
        # `modified-body-touched` detection for single-line guards
        # inserted inside existing methods (e.g. axios PR #10901).
        mallard diff-hunks \
          --base-sha "$BASE_SHA" \
          --head-sha "$HEAD_SHA" \
          --repo . \
          > .mallard/diff-hunks.json

    - name: Run pr-review
      id: review
      shell: bash
      env:
        MAX_COMMENTS: ${{ inputs.max-comments }}
        FILES: ${{ steps.files.outputs.files }}
        IGNORE_TEST_TRIVIA: ${{ inputs.ignore-test-trivia }}
      run: |
        if [ -z "$FILES" ]; then
          echo "No changed files between base and head — skipping review."
          echo "markdown-path=" >> "$GITHUB_OUTPUT"
          echo "comments-emitted=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        TRIVIA_ARG=""
        if [ "$IGNORE_TEST_TRIVIA" = "true" ]; then
          TRIVIA_ARG="--ignore-test-trivia"
        fi
        mallard pr-review \
          --base-db .mallard/base.duckdb \
          --head-db .mallard/head.duckdb \
          --files "$FILES" \
          --diff-hunks .mallard/diff-hunks.json \
          --max-comments "$MAX_COMMENTS" \
          $TRIVIA_ARG \
          --format json > .mallard/review.json
        mallard pr-review \
          --base-db .mallard/base.duckdb \
          --head-db .mallard/head.duckdb \
          --files "$FILES" \
          --diff-hunks .mallard/diff-hunks.json \
          --max-comments "$MAX_COMMENTS" \
          $TRIVIA_ARG \
          --format markdown > .mallard/review.md
        EMITTED=$(jq -r '.summary.comments_emitted // 0' .mallard/review.json)
        echo "markdown-path=$(pwd)/.mallard/review.md" >> "$GITHUB_OUTPUT"
        echo "comments-emitted=$EMITTED" >> "$GITHUB_OUTPUT"

    - name: Post review comment
      if: ${{ inputs.post-comment == 'true' && steps.review.outputs.markdown-path != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        gh pr comment "$PR_NUMBER" --body-file "${{ steps.review.outputs.markdown-path }}"
